<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buckshot Roulette Clone</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

      body { margin: 0; overflow: hidden; background-color: #050505; color: #e0e0e0; font-family: 'Courier Prime', monospace; }
      
      /* CRT Effect Overlay */
      #crt-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        background-size: 100% 2px, 3px 100%;
        z-index: 999;
      }
      
      #ui-layer { 
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; 
        padding: 40px; box-sizing: border-box; 
      }
      
      /* Header / Stats */
      .stats-bar { 
        display: flex; justify-content: space-between; align-items: flex-start; 
        text-transform: uppercase; letter-spacing: 2px;
      }
      
      .health-container { display: flex; flex-direction: column; gap: 10px; align-items: center; }
      .health-label { font-size: 1.2rem; color: #888; margin-bottom: 5px; }
      .health-icons { display: flex; gap: 5px; }
      .health-icon { width: 30px; height: 30px; background-image: url('/assets/images/health-icon.svg'); background-size: contain; background-repeat: no-repeat; filter: drop-shadow(0 0 5px red); transition: opacity 0.3s; }
      .health-icon.lost { opacity: 0.2; filter: grayscale(100%); }

      #turn-indicator { 
        font-size: 2rem; font-weight: bold; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); 
        background: rgba(0,0,0,0.8); padding: 10px 20px; border: 1px solid #444;
      }

      /* Notification Area */
      #center-notification {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        text-align: center; font-size: 2.5rem; color: #fff; 
        background: rgba(0,0,0,0.9); padding: 40px; border: 2px solid #fff;
        display: none; flex-direction: column; gap: 20px;
        z-index: 100;
        box-shadow: 0 0 30px rgba(0,0,0,0.8);
        pointer-events: auto;
      }
      #center-notification h2 { margin: 0; color: #ff3333; }
      #shell-count-display { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
      .shell-group { display: flex; flex-direction: column; align-items: center; }
      .shell-img { width: 40px; height: 80px; }

      /* Controls */
      #controls-area { 
        pointer-events: auto; display: flex; flex-direction: column; align-items: center; gap: 15px; 
        background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); padding-top: 50px;
      }
      
      .control-group { display: flex; gap: 20px; }
      
      button { 
        background: #1a1a1a; color: #e0e0e0; border: 2px solid #444; 
        padding: 15px 30px; cursor: pointer; font-family: 'Courier Prime', monospace; 
        font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px;
        transition: all 0.2s;
        box-shadow: 0 4px 0 #000;
      }
      button:hover { background: #333; border-color: #fff; transform: translateY(-2px); box-shadow: 0 6px 0 #000; }
      button:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
      button:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; border-color: #333; }

      #log { 
        width: 100%; max-width: 600px; height: 100px; overflow-y: auto; 
        font-size: 0.9rem; color: #aaa; text-align: center;
        border-top: 1px solid #333; padding-top: 10px;
        scrollbar-width: thin; scrollbar-color: #444 #111;
      }

      /* Menu */
      #main-menu, #game-over-menu {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 200; display: flex; flex-direction: column;
        justify-content: center; align-items: center; gap: 30px;
      }
      #main-menu h1, #game-over-menu h1 { font-size: 4rem; margin: 0; color: #ff3333; text-shadow: 5px 5px 0 #333; }
      #start-btn, #restart-btn { font-size: 2rem; padding: 20px 50px; border-width: 4px; }

      /* Crosshair */
      #crosshair {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 40px; height: 40px; opacity: 0.5; pointer-events: none;
        background-image: url('/assets/images/crosshair.svg'); background-size: contain;
      }

      .hidden { display: none !important; }
      
      /* Dealer Eyes Animation */
      @keyframes pulse-red {
        0% { filter: drop-shadow(0 0 2px red); }
        50% { filter: drop-shadow(0 0 10px red); }
        100% { filter: drop-shadow(0 0 2px red); }
      }
    </style>
  </head>
  <body>
    <div id="crt-overlay"></div>
    
    <div id="main-menu">
      <h1>BUCKSHOT ROULETTE</h1>
      <button id="start-btn">ENTER</button>
      <div style="color: #666; margin-top: 20px;">Use Headphones for Best Experience</div>
    </div>

    <div id="game-over-menu" class="hidden">
      <h1 id="game-over-title">GAME OVER</h1>
      <button id="restart-btn">TRY AGAIN</button>
    </div>

    <div id="ui-layer" class="hidden">
      <div id="crosshair"></div>
      
      <div class="stats-bar">
        <div class="health-container">
          <div class="health-label">DEALER</div>
          <div class="health-icons" id="dealer-health"></div>
        </div>
        
        <div id="turn-indicator">WAITING</div>
        
        <div class="health-container">
          <div class="health-label">YOU</div>
          <div class="health-icons" id="player-health"></div>
        </div>
      </div>

      <div id="center-notification">
        <h2 id="notification-title">ROUND START</h2>
        <div id="notification-msg">3 Live, 2 Blank</div>
        <div id="shell-count-display"></div>
        <button id="ack-btn" style="margin-top: 20px;">OK</button>
      </div>
      
      <div style="flex-grow: 1;"></div>

      <div id="controls-area">
        <div id="log"></div>
        <div class="control-group">
          <button id="btn-shoot-dealer">SHOOT DEALER</button>
          <button id="btn-shoot-self">SHOOT SELF</button>
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
